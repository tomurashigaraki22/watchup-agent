name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: go mod tidy
    
    - name: Verify dependencies
      run: go mod verify
    
    - name: Build
      run: go build -v -o watchup-agent cmd/agent/main.go
    
    - name: Run tests
      run: go test -v ./...
    
    - name: Build for multiple platforms
      run: |
        echo "Building for Linux AMD64..."
        GOOS=linux GOARCH=amd64 go build -o watchup-agent-linux-amd64 cmd/agent/main.go
        
        echo "Building for Linux ARM64..."
        GOOS=linux GOARCH=arm64 go build -o watchup-agent-linux-arm64 cmd/agent/main.go
        
        echo "Build complete!"
        ls -lh watchup-agent-*
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: binaries
        path: |
          watchup-agent-linux-amd64
          watchup-agent-linux-arm64
